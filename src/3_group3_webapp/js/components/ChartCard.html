<script>
/**
 * js/components/ChartCard.html — Chart.js wrapper component
 * ===================================================
 * การ์ดที่ห่อ Chart.js ไว้ข้างใน พร้อม title + subtitle + canvas
 *
 * ใช้งาน:
 *   const chart = new ChartCard(container, {
 *     title: 'Delivery Volume (7 days)',
 *     subtitle: 'จำนวนการจัดส่งรายวัน',
 *     type: 'bar',  // bar | line | pie | doughnut
 *     data: { labels: [...], datasets: [...] },
 *     options: { ... }
 *   });
 *   chart.render();
 *
 *   // อัปเดตข้อมูล (ตอน polling)
 *   chart.update(newData);
 *
 *   // ทำลาย (เพื่อ cleanup)
 *   chart.destroy();
 * ===================================================
 */

globalThis.ChartCard = (function () {
  'use strict';

  let chartCounter = 0;

  /**
   * ChartCard class
   * @param {HTMLElement} container
   * @param {Object} options
   */
  function ChartCard(container, options) {
    this.container = container;
    this.title = options.title || '';
    this.subtitle = options.subtitle || '';
    this.type = options.type || 'bar';
    this.data = options.data || { labels: [], datasets: [] };
    this.options = options.options || {};
    this.chart = null;
    this.canvasId = 'chart-' + (++chartCounter);
  }

  /**
   * render — วาด ChartCard
   */
  ChartCard.prototype.render = function () {
    if (!this.container) return;

    let html = '<div class="bg-white border border-gray-200 rounded-lg p-4">';
    if (this.title || this.subtitle) {
      html += '<div class="mb-3">';
      if (this.title) {
        html += '<h3 class="text-sm font-semibold text-gray-800">' + this.title + '</h3>';
      }
      if (this.subtitle) {
        html += '<p class="text-xs text-gray-500 mt-0.5">' + this.subtitle + '</p>';
      }
      html += '</div>';
    }
    html += '<div class="relative" style="height: 240px;">';
    html += '<canvas id="' + this.canvasId + '"></canvas>';
    html += '</div>';
    html += '</div>';

    this.container.innerHTML = html;

    // สร้าง Chart.js instance
    const canvas = document.getElementById(this.canvasId);
    if (canvas && globalThis.Chart) {
      const defaultOptions = getDefaultOptions_(this.type);
      const mergedOptions = { ...defaultOptions, ...this.options };
      this.chart = new Chart(canvas, {
        type: this.type,
        data: this.data,
        options: mergedOptions,
      });
    }
  };

  /**
   * update — อัปเดตข้อมูลใน chart (ใช้ตอน polling)
   * @param {Object} newData — { labels, datasets }
   */
  ChartCard.prototype.update = function (newData) {
    if (!this.chart) return;
    if (newData.labels) this.chart.data.labels = newData.labels;
    if (newData.datasets) this.chart.data.datasets = newData.datasets;
    this.chart.update('active');
  };

  /**
   * destroy — ทำลาย chart instance (cleanup memory)
   */
  ChartCard.prototype.destroy = function () {
    if (this.chart) {
      this.chart.destroy();
      this.chart = null;
    }
  };

  /**
   * getDefaultOptions_ — default Chart.js options สำหรับแต่ละ type
   * @private
   */
  function getDefaultOptions_(type) {
    const base = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
          labels: {
            font: { size: 11, family: 'Inter' },
            color: '#6b7280',
          },
        },
        tooltip: {
          backgroundColor: 'rgba(17, 24, 39, 0.9)',
          titleFont: { size: 12, family: 'Inter' },
          bodyFont: { size: 11, family: 'Inter' },
          padding: 8,
        },
      },
    };

    if (type === 'bar' || type === 'line') {
      return {
        ...base,
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { size: 10, family: 'Inter' }, color: '#9ca3af' },
          },
          y: {
            beginAtZero: true,
            grid: { color: '#f3f4f6' },
            ticks: { font: { size: 10, family: 'Inter' }, color: '#9ca3af' },
          },
        },
      };
    }

    if (type === 'pie' || type === 'doughnut') {
      return {
        ...base,
        cutout: type === 'doughnut' ? '60%' : undefined,
      };
    }

    return base;
  }

  return ChartCard;
})();

console.log('[ChartCard] component loaded');
</script>
