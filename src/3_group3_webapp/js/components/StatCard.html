<script>
/**
 * js/components/StatCard.html — StatCard component
 * ===================================================
 * การ์ดสถิติสำหรับแสดงตัวเลขเดียว + label + icon + trend
 *
 * ใช้งาน:
 *   StatCard.render(container, {
 *     label: 'FACT_DELIVERY',
 *     value: 1247,
 *     unit: 'rows',
 *     icon: 'package',
 *     color: 'blue',  // blue | green | yellow | red | gray
 *     hint: 'รายการจัดส่งทั้งหมด',
 *   });
 * ===================================================
 */

window.StatCard = (function () {
  'use strict';

  const COLOR_CLASSES = {
    blue:   { bg: 'bg-blue-50',    border: 'border-blue-200',    text: 'text-blue-700',    iconBg: 'bg-blue-100',    iconText: 'text-blue-600' },
    green:  { bg: 'bg-green-50',   border: 'border-green-200',   text: 'text-green-700',   iconBg: 'bg-green-100',   iconText: 'text-green-600' },
    yellow: { bg: 'bg-yellow-50',  border: 'border-yellow-200',  text: 'text-yellow-700',  iconBg: 'bg-yellow-100',  iconText: 'text-yellow-600' },
    red:    { bg: 'bg-red-50',     border: 'border-red-200',     text: 'text-red-700',     iconBg: 'bg-red-100',     iconText: 'text-red-600' },
    gray:   { bg: 'bg-gray-50',    border: 'border-gray-200',    text: 'text-gray-700',    iconBg: 'bg-gray-100',    iconText: 'text-gray-600' },
  };

  /**
   * formatValue — จัดรูปแบบตัวเลขให้อ่านง่าย (1,234 / 87.3%)
   */
  function formatValue(value, unit) {
    if (value === null || value === undefined) return '—';
    let formatted;
    if (typeof value === 'number') {
      if (unit === '%') {
        formatted = value.toFixed(1) + '%';
      } else if (value >= 1000) {
        formatted = value.toLocaleString('en-US');
      } else if (Number.isInteger(value)) {
        formatted = String(value);
      } else {
        formatted = value.toFixed(1);
      }
    } else {
      formatted = String(value);
    }
    return formatted;
  }

  /**
   * render — วาด StatCard ใน container ที่กำหนด
   *
   * @param {HTMLElement} container
   * @param {Object} props
   *   - label: string (หัวข้อ)
   *   - value: number|string
   *   - unit: string? ('rows' | '%' | '' — default '')
   *   - icon: string? (lucide icon name — default 'activity')
   *   - color: string? ('blue'|'green'|'yellow'|'red'|'gray' — default 'gray')
   *   - hint: string? (ข้อความเล็กใต้ค่า)
   *   - trend: number? (เปอร์เซ็นต์เปลี่ยนแปลง — แสดงลูกศร)
   */
  function render(container, props) {
    if (!container) return;
    const c = COLOR_CLASSES[props.color] || COLOR_CLASSES.gray;
    const iconName = props.icon || 'activity';
    const valueStr = formatValue(props.value, props.unit);

    // Trend indicator (ถ้ามี)
    let trendHtml = '';
    if (props.trend !== undefined && props.trend !== null) {
      const isUp = props.trend >= 0;
      const trendColor = isUp ? 'text-green-600' : 'text-red-600';
      const trendIcon = isUp ? '▲' : '▼';
      trendHtml =
        '<span class="text-xs ' + trendColor + ' ml-2">' +
        trendIcon + ' ' + Math.abs(props.trend).toFixed(1) + '%' +
        '</span>';
    }

    container.innerHTML =
      '<div class="' + c.bg + ' ' + c.border + ' border rounded-lg p-4 transition-all hover:shadow-md">' +
        '<div class="flex items-start justify-between">' +
          '<div class="flex-1">' +
            '<p class="text-xs font-medium text-gray-500 uppercase tracking-wide">' + props.label + '</p>' +
            '<p class="mt-2 text-2xl font-bold ' + c.text + '">' + valueStr +
              (props.unit && props.unit !== '%' ? ' <span class="text-sm font-normal text-gray-500">' + props.unit + '</span>' : '') +
            '</p>' +
            (props.hint ? '<p class="mt-1 text-xs text-gray-500">' + props.hint + '</p>' : '') +
            trendHtml +
          '</div>' +
          '<div class="' + c.iconBg + ' ' + c.iconText + ' rounded-lg p-2">' +
            '<i data-lucide="' + iconName + '" class="w-5 h-5"></i>' +
          '</div>' +
        '</div>' +
      '</div>';

    // Render lucide icons ที่เพิ่ง insert
    if (window.lucide) {
      container.querySelectorAll('[data-lucide]').forEach((el) => {
        window.lucide.createIcon({ name: el.getAttribute('data-lucide') });
      });
    }
  }

  /**
   * renderGrid — วาด StatCards หลายใบใน grid
   *
   * @param {HTMLElement} container
   * @param {Array<Object>} cards — array ของ props
   * @param {number} cols — จำนวนคอลัมน์ (default 4)
   */
  function renderGrid(container, cards, cols) {
    if (!container || !Array.isArray(cards)) return;
    cols = cols || 4;
    const gridClass = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-' + cols + ' gap-4';
    container.className = gridClass;

    cards.forEach((card) => {
      const cardDiv = document.createElement('div');
      container.appendChild(cardDiv);
      render(cardDiv, card);
    });
  }

  return {
    render: render,
    renderGrid: renderGrid,
    formatValue: formatValue,
  };
})();

console.log('[StatCard] component loaded');
</script>
