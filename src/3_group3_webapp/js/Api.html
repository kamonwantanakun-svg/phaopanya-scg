<script>
  /**
   * js/Api.html — Promisified google.script.run wrapper (v6.0.008)
   * ===================================================
   * ห่อ google.script.run แบบ callback ให้เป็น Promise เพื่อใช้ async/await ได้
   *
   * [V6.0.008 P1.1 — BI-02 fix from LMDS_PREDEPLOY_AUDIT 2026-07-08]
   *   - เพิ่ม 30s timeout ทุก call (BI-02 fix)
   *   - เพิ่ม concurrent call counter (ป้องกันการสะสม pending calls)
   *   - เพิ่ม diagnostic logging
   *   - MAX_CONCURRENT = 6 (dashboard อาจเรียก concurrent: getDashboardData + getMatchEngineLiveStatus + getMapAnalyticsData)
   *
   * ใช้งาน:
   *   const data = await api.getDashboardData();
   *   const page = await api.getFactDeliveryPage(0, 50, { status: 'FULL_MATCH' });
   * ===================================================
   */

  globalThis.api = (function () {
    'use strict';

    /**
     * CONFIG — [V6.0.008 P1.1] TIMEOUT_MS สำหรับทุก backend call
     *   ถ้า backend ไม่ตอบภายใน 30s → Promise reject
     *   (GAS execution limit คือ 6 นาที, แต่ 30s เป็น SLA ที่ UX acceptable)
     */
    const TIMEOUT_MS = 30000;

    /**
     * concurrentCalls_ — [V6.0.008 P1.1] นับจำนวน call ที่กำลังค้างอยู่
     *   ถ้าเกิน MAX_CONCURRENT → reject ทันที (ป้องกัน client overload)
     *   MAX_CONCURRENT = 6 (dashboard อาจเรียก 3-4 endpoints concurrent)
     */
    let concurrentCalls_ = 0;
    const MAX_CONCURRENT = 6;

    /**
     * promisify_ — แปลง google.script.run callback pattern เป็น Promise
     *   พร้อม 30s timeout fallback
     *
     * @param {string} fnName - ชื่อ server function
     * @param {...any} args - arguments ที่จะส่งไป
     * @return {Promise<any>}
     * @private
     */
    function promisify_(fnName, ...args) {
      return new Promise((resolve, reject) => {
        // [V6.0.008 P1.1] Concurrent guard — ถ้า call ค้างเยอะเกินไป ปฏิเสธก่อน
        if (concurrentCalls_ >= MAX_CONCURRENT) {
          const err = new Error('Too many concurrent requests (' + concurrentCalls_ + '). Please wait.');
          err.code = 'CLIENT_OVERLOAD';
          console.warn('[api] ' + fnName + ' rejected — overload');
          reject(err);
          return;
        }

        // [V6.0.008 P1.1] Timeout guard — 30s hard timeout
        let timedOut = false;
        const timer = setTimeout(function () {
          timedOut = true;
          concurrentCalls_ = Math.max(0, concurrentCalls_ - 1);
          const err = new Error(fnName + ' timeout after ' + TIMEOUT_MS + 'ms');
          err.code = 'TIMEOUT';
          err.fnName = fnName;
          console.error('[api] ' + fnName + ' timeout after ' + TIMEOUT_MS + 'ms');
          reject(err);
        }, TIMEOUT_MS);

        concurrentCalls_++;

        try {
          google.script.run
            .withSuccessHandler(function (result) {
              if (timedOut) return; // already rejected by timeout
              clearTimeout(timer);
              concurrentCalls_ = Math.max(0, concurrentCalls_ - 1);
              console.debug('[api] ' + fnName + ' ok (' + concurrentCalls_ + ' in flight)');
              resolve(result);
            })
            .withFailureHandler(function (err) {
              if (timedOut) return; // already rejected by timeout
              clearTimeout(timer);
              concurrentCalls_ = Math.max(0, concurrentCalls_ - 1);
              console.error('[api] ' + fnName + ' failed:', err);
              reject(normalizeError_(err));
            })
            [fnName](...args);
        } catch (err) {
          // กรณี google.script.run ยังไม่พร้อม (เช่น ใน IDE preview)
          if (!timedOut) {
            clearTimeout(timer);
            concurrentCalls_ = Math.max(0, concurrentCalls_ - 1);
          }
          console.error('[api] google.script.run not available:', err);
          reject(normalizeError_(err));
        }
      });
    }

    /**
     * normalizeError_ — ทำให้ error เป็น object ที่จัดการง่าย
     *
     * @param {Error|string|Object} err
     * @return {Error} Error ที่มี .message และ .details
     * @private
     */
    function normalizeError_(err) {
      if (err instanceof Error) return err;
      if (typeof err === 'string') return new Error(err);
      if (err && err.message) {
        const e = new Error(err.message);
        e.details = err.details || err.stack;
        return e;
      }
      return new Error('Unknown error');
    }

    /**
     * getStats — [V6.0.008 P1.1] ดึงสถิติปัจจุบัน (debug helper)
     * @return {{ concurrent: number, max: number, timeoutMs: number }}
     */
    function getStats() {
      return {
        concurrent: concurrentCalls_,
        max: MAX_CONCURRENT,
        timeoutMs: TIMEOUT_MS
      };
    }

    // ────────────────────────────────────────────────────────────
    // Public API methods (map 1:1 กับ server functions ใน 22_WebApp.gs)
    // ────────────────────────────────────────────────────────────

    return {
      /**
       * ping — ทดสอบการเชื่อมต่อ + auth
       * @return {Promise<{ok: boolean, timestamp: string, appVersion: string, user: string}>}
       */
      ping: () => promisify_('ping'),

      /**
       * getDashboardData — ดึงสถิติรวมสำหรับ Dashboard
       * @return {Promise<Object>} { stats, topIssues, sheetsExist, lastUpdated, appVersion, elapsedMs }
       */
      getDashboardData: () => promisify_('getDashboardData'),

      /**
       * getFactDeliveryPage — Phase 2.3: ดึงรายการ FACT_DELIVERY แบบ pagination + filter
       * @param {number} offset - 0-based
       * @param {number} limit - rows per page (default 50)
       * @param {Object} filter - { status: 'FULL_MATCH' | 'all' | ... }
       * @return {Promise<{rows: Array, total: number, offset: number, limit: number, statusCounts: Object, elapsedMs: number}>}
       */
      getFactDeliveryPage: (offset, limit, filter) => promisify_('getFactDeliveryPage', offset, limit, filter),

      /**
       * getQReviewPage — Phase 2: ดึงรายการ Q_REVIEW แบบ pagination + filter
       * @param {number} offset - 0-based
       * @param {number} limit - rows per page (default 50)
       * @param {string} statusFilter - 'Pending' | 'Approved' | 'Rejected' | 'Escalated' | 'Done' | 'all'
       * @return {Promise<{rows: Array, total: number, offset: number, limit: number, statusFilter: string, statusCounts: Object, elapsedMs: number}>}
       */
      getQReviewPage: (offset, limit, statusFilter) => promisify_('getQReviewPage', offset, limit, statusFilter),

      /**
       * submitReviewDecision — Phase 2: บันทึกการตัดสินใจ Approve/Reject
       * @param {string} reviewId
       * @param {string} decision - 'CREATE_NEW' | 'MERGE_TO_CANDIDATE' | 'IGNORE' | 'ESCALATE'
       * @param {string} note - optional note
       * @return {Promise<{ok: boolean, reviewId: string, decision: string, message: string}>}
       */
      submitReviewDecision: (reviewId, decision, note) => promisify_('submitReviewDecision', reviewId, decision, note),

      /**
       * getReviewDetail — Phase 2: ดึงรายละเอียดเต็มของ review item
       *   รวม source row + candidate persons/places/destinations + distance
       * @param {string} reviewId
       * @return {Promise<{ok, review, source, candidates: {persons, places, destinations}}>}
       */
      getReviewDetail: (reviewId) => promisify_('getReviewDetail', reviewId),

      /**
       * getMatchEngineMetrics — Phase 3: สถิติ Match Engine สำหรับหน้า dashboard
       * @return {Promise<{summary, statusCounts, scoreDistribution, scoreBins, matchReasons, matchActions, elapsedMs}>}
       */
      getMatchEngineMetrics: () => promisify_('getMatchEngineMetrics'),

      /**
       * getSourcePage — Phase 2.4: ดึงรายการจาก SOURCE sheet (ข้อมูลดิบจาก SCG API)
       * @param {number} offset - 0-based
       * @param {number} limit - rows per page (default 50, max 200)
       * @param {Object} filter - { syncStatus: 'SUCCESS' | 'PENDING' | 'ERROR' | 'EMPTY' | 'all' }
       * @return {Promise<{rows: Array, total: number, offset: number, limit: number, syncStatusCounts: Object, elapsedMs: number}>}
       */
      getSourcePage: (offset, limit, filter) => promisify_('getSourcePage', offset, limit, filter),

      /**
       * searchLocations — Phase 2: ค้นหาพิกัดจากชื่อ/ที่อยู่/เบอร์โทร/รหัสไปรษณีย์
       * @param {string} query - คำค้นหา
       * @param {number} [limit=20] - จำนวนผลลัพธ์สูงสุด
       * @return {Promise<{results: Array, total: number, query: string, elapsedMs: number}>}
       */
      searchLocations: (query, limit) => promisify_('searchLocations', query, limit),

      /**
       * getMapAnalyticsData — [V6.0.004] ดึงข้อมูลการจัดส่งสำหรับแสดงบนแผนที่
       * @param {number} days - จำนวนวันย้อนหลัง
       * @param {string} filterStatus - กรองตาม match status
       * @return {Promise<Array<{lat,lng,count,matchStatus,personId,destId}>>}
       */
      getMapAnalyticsData: (days, filter) => promisify_('getMapAnalyticsData', days, filter),

      /**
       * getMatchEngineLiveStatus — [V6.0.004] ดึงสถานะล่าสุดของ MatchEngine
       * @return {Promise<{isRunning,currentRow,totalRows,startedAt,lastMatchAt,errorCount,recentMatches}>}
       */
      getMatchEngineLiveStatus: () => promisify_('getMatchEngineLiveStatus'),

      // [V6.0.008 P1.1] Expose diagnostic stats for debugging
      getStats: getStats
    };
  })();

  console.log(
    '[api] LMDS API wrapper loaded (v6.0.008) —',
    Object.keys(globalThis.api).length,
    'methods, timeout=30s, max_concurrent=6'
  );
</script>
