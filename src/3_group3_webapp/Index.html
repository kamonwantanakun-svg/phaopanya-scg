    window.__INITIAL_DATA__ = <?= JSON.stringify(initialData) ?>;
    window.__APP_VERSION__  = '<?= appVersion ?>';
    window.__APP_NAME__     = '<?= appName ?>';
    window.__CURRENT_USER__ = <?= JSON.stringify(currentUser) ?>;
    window.__DEPLOYED_AT__  = '<?= deployedAt ?>';

    // Polling config (60 วินาที)
    window.__POLL_INTERVAL_MS__ = 60 * 1000;
  </script>
