<!-- views/MapAnalytics.html — [V6.0.004] Interactive Map Analytics -->
<script>
  (function () {
    'use strict';

    const MapAnalyticsView = {
      render: function (data, container) {
        container.innerHTML =
          '<div class="space-y-4">' +
          '<div class="flex justify-between items-center">' +
          '<h2 class="text-lg font-semibold text-gray-900">🗺️ Map Analytics</h2>' +
          '<div class="flex gap-2">' +
          '<select id="mapDaysSelect" class="text-sm border rounded px-2 py-1">' +
          '<option value="7">7 วัน</option>' +
          '<option value="30" selected>30 วัน</option>' +
          '<option value="90">90 วัน</option>' +
          '</select>' +
          '<button type="button" id="mapLoadBtn" class="px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">โหลด</button>' +
          '</div>' +
          '</div>' +
          '<div id="mapContainer" style="height: 500px; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden;">' +
          '<div class="flex items-center justify-center h-full text-gray-400 text-sm">กดปุ่ม "โหลด" เพื่อแสดงแผนที่</div>' +
          '</div>' +
          '<div id="mapStats" class="text-sm text-gray-500"></div>' +
          '</div>';

        const loadBtn = document.getElementById('mapLoadBtn');
        const daysSelect = document.getElementById('mapDaysSelect');
        const mapContainer = document.getElementById('mapContainer');
        const statsDiv = document.getElementById('mapStats');

        loadBtn.addEventListener('click', async function () {
          loadBtn.disabled = true;
          loadBtn.textContent = 'กำลังโหลด...';
          mapContainer.innerHTML =
            '<div class="flex items-center justify-center h-full text-gray-400 text-sm">กำลังโหลดข้อมูล...</div>';

          try {
            const days = parseInt(daysSelect.value, 10) || 30;
            const points = await globalThis.api.getMapAnalyticsData(days, '');

            if (!points || points.length === 0) {
              mapContainer.innerHTML =
                '<div class="flex items-center justify-center h-full text-gray-400 text-sm">ไม่มีข้อมูลพิกัด</div>';
              statsDiv.textContent = '';
              return;
            }

            // Load Leaflet CSS
            if (!document.getElementById('leaflet-css')) {
              const link = document.createElement('link');
              link.id = 'leaflet-css';
              link.rel = 'stylesheet';
              link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
              document.head.appendChild(link);
            }

            // Load Leaflet JS
            if (!window.L) {
              await new Promise(function (resolve, reject) {
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
              });
            }

            // Load heatlayer plugin
            if (!window.L.heatLayer) {
              await new Promise(function (resolve, reject) {
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
              });
            }

            mapContainer.innerHTML = '';
            const map = L.map(mapContainer).setView([13.7563, 100.5018], 6);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
              attribution: '© OpenStreetMap',
              maxZoom: 18
            }).addTo(map);

            // Heatmap
            const heatPoints = points.map(function (p) {
              return [p.lat, p.lng, p.count];
            });
            L.heatLayer(heatPoints, {
              radius: 25,
              blur: 15,
              maxZoom: 17,
              gradient: { 0.2: 'blue', 0.4: 'lime', 0.6: 'orange', 0.8: 'red' }
            }).addTo(map);

            // Markers for top points
            points.slice(0, 50).forEach(function (p) {
              const marker = L.marker([p.lat, p.lng]);
              marker.bindPopup('<strong>' + p.count + ' deliveries</strong><br>Status: ' + p.matchStatus);
              marker.addTo(map);
            });

            // Fit bounds
            if (points.length > 0) {
              const bounds = L.latLngBounds(
                points.map(function (p) {
                  return [p.lat, p.lng];
                })
              );
              map.fitBounds(bounds, { padding: [50, 50] });
            }

            statsDiv.textContent = 'แสดง ' + points.length + ' จุด จาก ' + days + ' วันที่ผ่านมา';
          } catch (err) {
            console.error('[MapAnalyticsView] Error:', err);
            mapContainer.innerHTML =
              '<div class="flex items-center justify-center h-full text-red-500 text-sm">เกิดข้อผิดพลาด: ' +
              err.message +
              '</div>';
          } finally {
            loadBtn.disabled = false;
            loadBtn.textContent = 'โหลด';
          }
        });
      }
    };

    globalThis.MapAnalyticsView = MapAnalyticsView;
  })();
</script>
