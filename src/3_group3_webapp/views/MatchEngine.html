<script>
/**
 * views/MatchEngine.html — Match Engine Metrics view (Phase 3)
 * ===================================================
 * Dashboard สถิติ Match Engine — ภาพรวมคุณภาพการ match
 *   - Summary cards: ทั้งหมด, auto-match rate, avg/max/min score
 *   - Score Distribution (bar chart)
 *   - Match Status Breakdown (doughnut chart)
 *   - Top Match Reasons (table)
 *   - Match Actions breakdown (table)
 *
 * Backend functions (ใน 22_WebApp.gs):
 *   - getMatchEngineMetrics() → { summary, statusCounts, scoreDistribution, scoreBins, matchReasons, matchActions }
 * ===================================================
 */
globalThis.MatchEngineView = (function () {
  'use strict';

  // ────────────────────────────────────────────────────────────
  // State
  // ────────────────────────────────────────────────────────────
  let chart1 = null;  // score distribution
  let chart2 = null;  // status doughnut

  // ────────────────────────────────────────────────────────────
  // Constants
  // ────────────────────────────────────────────────────────────
  const STATUS_COLORS = {
    'FULL_MATCH':   '#10b981',  // green-500
    'GEO_ANCHOR':   '#3b82f6',  // blue-500
    'FUZZY_MATCH':  '#06b6d4',  // cyan-500
    'CREATE_NEW':   '#f59e0b',  // yellow-500
    'NEEDS_REVIEW': '#f97316',  // orange-500
    'ERROR':        '#ef4444',  // red-500
  };

  const STATUS_ORDER = ['FULL_MATCH', 'GEO_ANCHOR', 'FUZZY_MATCH', 'CREATE_NEW', 'NEEDS_REVIEW', 'ERROR'];

  // ────────────────────────────────────────────────────────────
  // Public: render(container)
  // ────────────────────────────────────────────────────────────
  function render(data, container) {
    if (container === null) return;

    let html = '';
    html += buildHeaderHtml_();
    html += '<div id="matchMetricsContainer">กำลังโหลด...</div>';
    container.innerHTML = html;

    loadMetrics_();
  }

  // ────────────────────────────────────────────────────────────
  // Builders
  // ────────────────────────────────────────────────────────────
  function buildHeaderHtml_() {
    return '<div class="mb-6">' +
      '<h2 class="text-2xl font-bold text-gray-900">📈 Match Engine Metrics</h2>' +
      '<p class="text-sm text-gray-500 mt-1">ภาพรวมคุณภาพการ match — วิเคราะห์จาก FACT_DELIVERY</p>' +
    '</div>';
  }

  function buildLoadingHtml_() {
    return '<div class="flex items-center justify-center h-64">' +
      '<div class="text-center">' +
        '<div class="inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>' +
        '<p class="mt-3 text-sm text-gray-500">กำลังวิเคราะห์ข้อมูล...</p>' +
      '</div>' +
    '</div>';
  }

  function buildErrorHtml_(message) {
    return '<div class="bg-red-50 border border-red-200 rounded-lg p-6 text-center">' +
      '<div class="text-4xl mb-2">⚠️</div>' +
      '<h2 class="text-lg font-semibold text-red-800 mb-1">เกิดข้อผิดพลาด</h2>' +
      '<p class="text-sm text-red-600">' + escapeHtml_(message || 'Unknown error') + '</p>' +
      '<button type="button" onclick="globalThis.MatchEngineView && globalThis.MatchEngineView.retry()" class="mt-4 px-4 py-2 bg-red-600 text-white rounded text-sm hover:bg-red-700">ลองใหม่</button>' +
    '</div>';
  }

  function buildEmptyStateHtml_() {
    return '<div class="bg-white border border-gray-200 rounded-lg p-12 text-center">' +
      '<div class="text-4xl mb-3">📭</div>' +
      '<h3 class="text-lg font-semibold text-gray-700 mb-1">ยังไม่มีข้อมูลใน FACT_DELIVERY</h3>' +
      '<p class="text-sm text-gray-500">ระบบจะแสดงสถิติเมื่อมีข้อมูลใน FACT_DELIVERY</p>' +
    '</div>';
  }

  function buildSummaryCardsHtml_(summary) {
    // [SonarCloud S3358] แยก nested ternary เป็น helper function เพื่ออ่านง่าย
    const autoMatchColor = chooseAutoMatchColor_(summary.autoMatchRate);
    const COLOR_CLASSES = {
      blue:   { bg: 'bg-blue-50',    border: 'border-blue-200',    text: 'text-blue-700',    iconBg: 'bg-blue-100',    iconText: 'text-blue-600' },
      green:  { bg: 'bg-green-50',   border: 'border-green-200',   text: 'text-green-700',   iconBg: 'bg-green-100',   iconText: 'text-green-600' },
      yellow: { bg: 'bg-yellow-50',  border: 'border-yellow-200',  text: 'text-yellow-700',  iconBg: 'bg-yellow-100',  iconText: 'text-yellow-600' },
      red:    { bg: 'bg-red-50',     border: 'border-red-200',     text: 'text-red-700',     iconBg: 'bg-red-100',     iconText: 'text-red-600' },
      gray:   { bg: 'bg-gray-50',    border: 'border-gray-200',    text: 'text-gray-700',    iconBg: 'bg-gray-100',    iconText: 'text-gray-600' },
    };

    const cards = [
      { label: 'ทั้งหมด', value: summary.total, unit: 'rows', icon: '📊', color: 'blue' },
      { label: 'Auto Match Rate', value: summary.autoMatchRate, unit: '%', icon: '⚡', color: autoMatchColor },
      { label: 'Avg Score', value: summary.avgScore, unit: '/100', icon: '🎯', color: 'gray' },
      { label: 'Max Score', value: summary.maxScore, unit: '/100', icon: '⬆️', color: 'green' },
      { label: 'Min Score', value: summary.minScore, unit: '/100', icon: '⬇️', color: 'red' },
      { label: 'มี Score', value: summary.withScoreCount, unit: '/' + summary.total, icon: '✓', color: 'gray' },
    ];

    return '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3 mb-6">' +
      cards.map(function(c) {
        const cls = COLOR_CLASSES[c.color] || COLOR_CLASSES.gray;
        return '<div class="' + cls.bg + ' ' + cls.border + ' border rounded-lg p-3">' +
          '<div class="flex items-center justify-between">' +
            '<div>' +
              '<p class="text-xs font-medium text-gray-500 uppercase">' + escapeHtml_(c.label) + '</p>' +
              '<p class="mt-1 text-xl font-bold ' + cls.text + '">' + c.value + ' <span class="text-xs font-normal text-gray-500">' + c.unit + '</span></p>' +
            '</div>' +
            '<div class="' + cls.iconBg + ' ' + cls.iconText + ' rounded-lg p-1.5 text-lg">' + c.icon + '</div>' +
          '</div>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  function buildChartsHtml_(data) {
    return '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">' +
      // Score distribution bar chart
      '<div class="bg-white border border-gray-200 rounded-lg p-4">' +
        '<h3 class="text-sm font-semibold text-gray-800 mb-1">Score Distribution</h3>' +
        '<p class="text-xs text-gray-500 mb-3">การกระจายตัวของ match score (0-100) — บอกคุณภาพการ match โดยรวม</p>' +
        '<div class="relative" style="height: 280px;">' +
          '<canvas id="matchScoreChart"></canvas>' +
        '</div>' +
      '</div>' +
      // Status breakdown doughnut chart
      '<div class="bg-white border border-gray-200 rounded-lg p-4">' +
        '<h3 class="text-sm font-semibold text-gray-800 mb-1">Match Status Breakdown</h3>' +
        '<p class="text-xs text-gray-500 mb-3">สัดส่วนแต่ละ match status</p>' +
        '<div class="relative" style="height: 280px;">' +
          '<canvas id="matchStatusChart"></canvas>' +
        '</div>' +
      '</div>' +
    '</div>';
  }

  function buildTablesHtml_(data) {
    let html = '<div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">';

    // Top Match Reasons
    html += '<div class="bg-white border border-gray-200 rounded-lg p-4">';
    html += '<h3 class="text-sm font-semibold text-gray-800 mb-1">🏆 Top Match Reasons</h3>';
    html += '<p class="text-xs text-gray-500 mb-3">เหตุผลที่ใช้ตัดสินใจ match — แสดง top 15</p>';
    if (data.matchReasons && data.matchReasons.length > 0) {
      html += buildReasonsTableHtml_(data.matchReasons);
    } else {
      html += '<p class="text-sm text-gray-400 italic">ไม่มีข้อมูล match_reason</p>';
    }
    html += '</div>';

    // Match Actions
    html += '<div class="bg-white border border-gray-200 rounded-lg p-4">';
    html += '<h3 class="text-sm font-semibold text-gray-800 mb-1">⚙️ Match Actions</h3>';
    html += '<p class="text-xs text-gray-500 mb-3">การกระทำที่ทำหลัง match</p>';
    if (data.matchActions && data.matchActions.length > 0) {
      html += buildActionsTableHtml_(data.matchActions);
    } else {
      html += '<p class="text-sm text-gray-400 italic">ไม่มีข้อมูล match_action</p>';
    }
    html += '</div>';

    html += '</div>';
    return html;
  }

  function buildReasonsTableHtml_(reasons) {
    const maxCount = reasons[0].count || 1;
    let html = '<div class="space-y-1.5">';
    reasons.forEach(function(r, idx) {
      const barWidth = Math.round((r.count / maxCount) * 100);
      const color = idx < 3 ? 'bg-blue-500' : 'bg-gray-400';
      html += '<div class="flex items-center gap-2">' +
        '<div class="flex-1 min-w-0">' +
          '<div class="flex justify-between items-center text-xs mb-0.5">' +
            '<span class="font-mono text-gray-700 truncate" title="' + escapeHtml_(r.reason) + '">' + escapeHtml_(r.reason) + '</span>' +
            '<span class="text-gray-500 ml-2 flex-shrink-0">' + r.count + ' ครั้ง</span>' +
          '</div>' +
          '<div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden">' +
            '<div class="' + color + ' h-1.5 rounded-full transition-all duration-500" style="width: ' + barWidth + '%"></div>' +
          '</div>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';
    return html;
  }

  function buildActionsTableHtml_(actions) {
    const maxCount = actions[0].count || 1;
    let html = '<div class="space-y-1.5">';
    actions.forEach(function(a) {
      const barWidth = Math.round((a.count / maxCount) * 100);
      html += '<div class="flex items-center gap-2">' +
        '<div class="flex-1 min-w-0">' +
          '<div class="flex justify-between items-center text-xs mb-0.5">' +
            '<span class="font-mono text-gray-700">' + escapeHtml_(a.action) + '</span>' +
            '<span class="text-gray-500 ml-2 flex-shrink-0">' + a.count + ' ครั้ง</span>' +
          '</div>' +
          '<div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden">' +
            '<div class="bg-green-500 h-1.5 rounded-full transition-all duration-500" style="width: ' + barWidth + '%"></div>' +
          '</div>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';
    return html;
  }

  // ────────────────────────────────────────────────────────────
  // Chart rendering (Chart.js)
  // ────────────────────────────────────────────────────────────
  function renderScoreDistributionChart_(data) {
    const canvas = document.getElementById('matchScoreChart');
    if (!canvas || !globalThis.Chart) return;

    // ทำลาย chart เดิมก่อน (ถ้ามี)
    if (chart1) { chart1.destroy(); chart1 = null; }

    // กำหนดสีให้แต่ละ bin — ไล่จากแดง (คะแนนต่ำ) ไปเขียว (คะแนนสูง)
    const binColors = [
      '#ef4444', '#f87171', '#fbbf24', '#fcd34d', '#fde68a',
      '#d9f99d', '#86efac', '#4ade80', '#22c55e', '#16a34a'
    ];

    chart1 = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: data.scoreBins,
        datasets: [{
          label: 'จำนวนรายการ',
          data: data.scoreDistribution,
          backgroundColor: binColors,
          borderColor: binColors.map(function(c) { return c; }),
          borderWidth: 1,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(17, 24, 39, 0.9)',
            padding: 8,
            callbacks: {
              title: function(items) { return 'Score ' + items[0].label; },
              label: function(item) {
                const total = data.summary.total || 1;
                const pct = ((item.parsed.y / total) * 100).toFixed(1);
                return item.parsed.y + ' รายการ (' + pct + '%)';
              },
            },
          },
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { font: { size: 10 }, color: '#6b7280' },
            title: { display: true, text: 'Match Score Range', font: { size: 11 }, color: '#6b7280' },
          },
          y: {
            beginAtZero: true,
            grid: { color: '#f3f4f6' },
            ticks: { font: { size: 10 }, color: '#9ca3af' },
            title: { display: true, text: 'จำนวนรายการ', font: { size: 11 }, color: '#6b7280' },
          },
        },
      },
    });
  }

  function renderStatusChart_(data) {
    const canvas = document.getElementById('matchStatusChart');
    if (!canvas || !globalThis.Chart) return;

    if (chart2) { chart2.destroy(); chart2 = null; }

    // เรียงตาม STATUS_ORDER และเอาเฉพาะที่มีใน statusCounts
    const labels = [];
    const values = [];
    const colors = [];
    STATUS_ORDER.forEach(function(status) {
      if (data.statusCounts[status]) {
        labels.push(status);
        values.push(data.statusCounts[status]);
        colors.push(STATUS_COLORS[status]);
      }
    });
    // เพิ่ม status อื่น ๆ ที่ไม่อยู่ใน STATUS_ORDER
    Object.keys(data.statusCounts).forEach(function(status) {
      // [SonarCloud S7765] ใช้ .includes() แทน .indexOf() === -1
      if (!STATUS_ORDER.includes(status)) {
        labels.push(status);
        values.push(data.statusCounts[status]);
        colors.push('#9ca3af');  // gray
      }
    });

    if (labels.length === 0) return;

    chart2 = new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: labels,
        datasets: [{
          data: values,
          backgroundColor: colors,
          borderColor: '#ffffff',
          borderWidth: 2,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '60%',
        plugins: {
          legend: {
            position: 'right',
            labels: {
              font: { size: 11 },
              color: '#374151',
              boxWidth: 14,
              padding: 8,
            },
          },
          tooltip: {
            backgroundColor: 'rgba(17, 24, 39, 0.9)',
            padding: 8,
            callbacks: {
              label: function(item) {
                const total = values.reduce(function(a, b) { return a + b; }, 0);
                const pct = ((item.parsed / total) * 100).toFixed(1);
                return item.label + ': ' + item.parsed + ' (' + pct + '%)';
              },
            },
          },
        },
      },
    });
  }

  // ────────────────────────────────────────────────────────────
  // Load metrics
  // ────────────────────────────────────────────────────────────
  async function loadMetrics_() {
    if (!globalThis.api || typeof globalThis.api.getMatchEngineMetrics !== 'function') {
      const c = document.getElementById('matchMetricsContainer');
      if (c) c.innerHTML = buildErrorHtml_('API ไม่พร้อมใช้งาน');
      return;
    }

    const container = document.getElementById('matchMetricsContainer');
    if (container) container.innerHTML = buildLoadingHtml_();

    try {
      const data = await globalThis.api.getMatchEngineMetrics();

      // Empty state
      if (!data.summary || data.summary.total === 0) {
        if (container) container.innerHTML = buildEmptyStateHtml_();
        return;
      }

      // Render
      let html = '';
      html += buildSummaryCardsHtml_(data.summary);
      html += buildChartsHtml_(data);
      html += buildTablesHtml_(data);
      html += '<p class="text-xs text-gray-400 text-center">วิเคราะห์จาก FACT_DELIVERY • ใช้เวลา ' + (data.elapsedMs || 0) + 'ms</p>';
      container.innerHTML = html;

      // Render charts (ต้องหลังจาก innerHTML set แล้ว canvas ถึงจะอยู่ใน DOM)
      renderScoreDistributionChart_(data);
      renderStatusChart_(data);
    } catch (err) {
      console.error('[MatchEngineView] loadMetrics_ failed:', err);
      if (container) container.innerHTML = buildErrorHtml_(err.message);
      showToast_('โหลดสถิติล้มเหลว', err.message, 'error', 5000);
    }
  }

  function retry() {
    // ทำลาย chart เดิมก่อน
    if (chart1) { chart1.destroy(); chart1 = null; }
    if (chart2) { chart2.destroy(); chart2 = null; }
    loadMetrics_();
  }

  /**
   * destroy — cleanup function สำหรับเรียกตอนออกจาก view (ถ้ามี)
   */
  function destroy() {
    if (chart1) { chart1.destroy(); chart1 = null; }
    if (chart2) { chart2.destroy(); chart2 = null; }
  }

  // ────────────────────────────────────────────────────────────
  // Helpers
  // ────────────────────────────────────────────────────────────
  function escapeHtml_(str) {
    return String(str == null ? '' : str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
  }

  function showToast_(title, message, type, duration) {
    if (globalThis.LMDSApp && typeof globalThis.LMDSApp.showToast === 'function') {
      globalThis.LMDSApp.showToast(title, message, type, duration);
    }
  }

  /**
   * chooseAutoMatchColor_ — เลือกสี Auto Match Rate card ตามเปอร์เซ็นต์
   *   [SonarCloud S3358] แยกจาก nested ternary ใน buildSummaryCardsHtml_
   * @param {number} rate - auto match rate (%)
   * @return {string} 'green' | 'yellow' | 'red'
   * @private
   */
  function chooseAutoMatchColor_(rate = 0) {
    // [SonarCloud S7760] ใช้ default parameter แทน reassignment
    if (rate >= 80) return 'green';
    if (rate >= 50) return 'yellow';
    return 'red';
  }

  return {
    render: render,
    retry: retry,
    destroy: destroy,
  };
})();

console.log('[MatchEngineView] view loaded');
</script>
