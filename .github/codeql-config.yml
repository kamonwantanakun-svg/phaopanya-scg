# CodeQL configuration — กำหนด paths ที่ CodeQL ควร/ไม่ควรสแกน
# https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/codeql-code-scanning-for-compiled-languages

# Apps Script ใช้ .gs (ไม่ใช่ .js) — CodeQL ไม่รู้จัก .gs โดย default
# วิธีแก้: ใช้ workflow step ที่ copy .gs → .js ก่อน CodeQL สแกน
# (ดู 06-codeql.yml step "Prepare .gs files for CodeQL")

paths:
  - 'src'
paths-ignore:
  - '**/*.html'
  - '**/*.css'
  - 'node_modules'
  - 'docs'
  - 'scripts'
  - '.github'
