name: 🚀 Deploy to Google Apps Script

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'appsscript.json'
      - '.github/workflows/02-deploy.yml'
  workflow_dispatch:
    inputs:
      version:
        description: '📌 Version label (เช่น v5.5.023)'
        required: false
        default: 'manual'
      force:
        description: '⚠️ Force deploy (ข้าม confirm)'
        required: false
        default: 'false'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  preflight:
    name: 🛡️ Pre-flight Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: ✅ ตรวจสอบว่ามี Secret ที่จำเป็น
        env:
          CLASPRC: ${{ secrets.CLASPRC }}
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: |
          echo "=== 🛡️ Pre-flight Check ==="
          errors=0
          if [[ -z "$CLASPRC" ]]; then
            echo "  ❌ ไม่พบ Secret: CLASPRC (clasp credentials)"
            errors=$((errors+1))
          else
            echo "  ✅ CLASPRC: พบแล้ว"
          fi
          if [[ -z "$APPS_SCRIPT_ID" ]]; then
            echo "  ❌ ไม่พบ Secret: APPS_SCRIPT_ID"
            errors=$((errors+1))
          else
            echo "  ✅ APPS_SCRIPT_ID: ${APPS_SCRIPT_ID:0:10}..."
          fi
          if [[ $errors -gt 0 ]]; then
            echo ""
            echo "  ❌ Pre-flight ล้มเหลว — โปรดตั้ง Secret ก่อน deploy"
            exit 1
          fi

      - name: 🔍 ตรวจสอบว่ามีไฟล์ที่จำเป็นครบ
        run: |
          echo "=== 🔍 ตรวจสอบไฟล์ที่จำเป็น ==="
          required_files=(
            "appsscript.json"
            "src/O_core_system/00_App.gs"
            "src/O_core_system/01_Config.gs"
            "src/O_core_system/02_Schema.gs"
          )
          for f in "${required_files[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "  ❌ ขาดไฟล์: $f"
              exit 1
            else
              echo "  ✅ $f"
            fi
          done

      - name: 📊 แสดงสถานะปัจจุบัน
        run: |
          echo "=== 📊 Deployment Info ==="
          echo "  🏷️  Version: ${{ github.event.inputs.version || 'auto' }}"
          echo "  📝 Commit:  ${{ github.sha }}"
          echo "  👤 Author:  ${{ github.actor }}"
          echo "  🌿 Branch:  ${{ github.ref_name }}"
          echo "  📅 Time:    $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

  deploy:
    name: 🚀 Deploy via clasp
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: preflight
    environment: production

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js 20 (Fix clasp Premature close bug)
        # [FIX Deploy #6 — clasp issue #1158]
        #   clasp 3.1.3 มี bug กับ Node.js ที่มี http.Agent keep-alive security backport
        #   ได้แก่ Node 22.23.0+, 24.17.0+, 25+, 26+ — ทำให้เกิด 'Premature close' error
        #   Node 20.x (LTS) ไม่มี bug นี้ จึงใช้ได้ปกติ
        #   Reference: https://github.com/google/clasp/issues/1158
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          check-latest: true

      - name: 📦 ติดตั้ง clasp
        run: |
          echo "=== 📦 ติดตั้ง clasp ==="
          echo "  Node.js version: $(node --version)"
          echo "  npm version: $(npm --version)"
          npm install -g @google/clasp
          echo "  clasp version: $(clasp --version)"

      - name: 🔐 Login ด้วย CLASPRC + Diagnostic
        env:
          CLASPRC: ${{ secrets.CLASPRC }}
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: |
          echo "=== 🔐 Login to Google + Diagnostic ==="
          echo "$CLASPRC" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json

          # [FIX Deploy #4] Diagnostic — ตรวจสอบ CLASPRC และ APPS_SCRIPT_ID format
          echo ""
          echo "=== 📊 Diagnostic ==="

          # 1. ตรวจ CLASPRC
          if [[ ! -s ~/.clasprc.json ]]; then
            echo "  ❌ ~/.clasprc.json ว่างหรือไม่ exist — CLASPRC secret ไม่ถูกต้อง"
            exit 1
          fi
          CLASPRC_SIZE=$(wc -c < ~/.clasprc.json)
          echo "  ✅ ~/.clasprc.json size: $CLASPRC_SIZE bytes"

          # ตรวจ CLASPRC format (ควรมี access_token, refresh_token, scope)
          # [FIX] ใช้ $HOME แทน /root/ เพราะ GitHub Actions runner ใช้ /home/runner
          if ! python3 -c "
          import json, os
          clasprc_path = os.path.join(os.environ.get('HOME', '/root'), '.clasprc.json')
          with open(clasprc_path) as f:
              d = json.load(f)
          if 'access_token' not in d and 'token' not in str(d):
              print('  ⚠️  ไม่พบ access_token ใน clasprc.json')
              exit(1)
          if 'refresh_token' not in str(d):
              print('  ⚠️  ไม่พบ refresh_token — token อาจหมดอายุและไม่สามารถ refresh ได้')
          print('  ✅ CLASPRC format ถูกต้อง')
          " 2>&1; then
            echo "  ℹ️  CLASPRC format check ข้ามไป (อาจไม่ใช่ปัญหา)"
          fi || true

          # 2. ตรวจ APPS_SCRIPT_ID format (ควรยาว ~57 ตัวอักษร)
          echo ""
          echo "  📋 APPS_SCRIPT_ID length: ${#APPS_SCRIPT_ID}"
          if [[ ${#APPS_SCRIPT_ID} -lt 40 ]]; then
            echo "  ❌ APPS_SCRIPT_ID สั้นเกินไป (${#APPS_SCRIPT_ID} ตัวอักษร) — ควรยาว ~57 ตัวอักษร"
            echo "     วิธีหา Script ID:"
            echo "     1. เปิด https://script.google.com"
            echo "     2. เปิดโปรเจกต์ Apps Script ของคุณ"
            echo "     3. คลิก ⚙️ Project Settings (ซ้ายบน)"
            echo "     4. ดูที่ 'Script ID' — copy มาทั้งหมด"
            echo "     5. ไป GitHub > Settings > Secrets > APPS_SCRIPT_ID > Update"
            exit 1
          fi
          echo "  ✅ APPS_SCRIPT_ID length OK"

          # 3. ตรวจ API access โดยตรง (bypass clasp)
          echo ""
          echo "  🔍 ตรวจสอบ API access โดยตรง..."
          ACCESS_TOKEN=$(python3 -c "
          import json, os
          clasprc_path = os.path.join(os.environ.get('HOME', '/root'), '.clasprc.json')
          try:
              with open(clasprc_path) as f:
                  d = json.load(f)
              # clasprc.json อาจเก็บ token ใน field ต่างกันตาม clasp version
              if 'access_token' in d:
                  print(d['access_token'])
              elif 'token' in d and isinstance(d['token'], dict):
                  print(d['token'].get('access_token', ''))
              else:
                  print('')
          except Exception:
              print('')
          " 2>/dev/null || echo "")

          if [[ -z "$ACCESS_TOKEN" ]]; then
            echo "  ⚠️  ไม่สามารถดึง access_token จาก clasprc.json — ข้าม API test"
          else
            echo "  ℹ️  ทดสอบเรียก Apps Script API โดยตรง..."
            HTTP_CODE=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://script.googleapis.com/v1/projects/$APPS_SCRIPT_ID")
            echo "  📊 HTTP Status: $HTTP_CODE"
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "  ✅ API access สำเร็จ — Script ID ถูกต้อง"
            elif [[ "$HTTP_CODE" == "403" ]]; then
              echo "  ❌ 403 Forbidden — ตรวจสอบ:"
              echo "     1. Apps Script API enabled ใน Google Cloud Project หรือไม่"
              echo "     2. Google Account มีสิทธิ์ Editor ใน Apps Script project หรือไม่"
              cat /tmp/api_response.json | head -5
              exit 1
            elif [[ "$HTTP_CODE" == "404" ]]; then
              echo "  ❌ 404 Not Found — Script ID ไม่ถูกต้องหรือ project ไม่ exist"
              exit 1
            else
              echo "  ⚠️  HTTP $HTTP_CODE — ดู response:"
              cat /tmp/api_response.json | head -10
            fi
          fi

          echo ""
          echo "  ✅ Login + Diagnostic เสร็จสิ้น"

      - name: 🔗 Setup Apps Script project (skip clone — push โดยตรง)
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: |
          echo "=== 🔗 Setup Apps Script project ==="
          echo "  📋 Script ID: $APPS_SCRIPT_ID"

          # [FIX Deploy #3] เปลี่ยน approach — ไม่ clone แล้ว push โดยตรง
          #   สาเหตุ: clasp clone มัก fail ด้วย "Premature close" เมื่อ:
          #     - Project มีไฟล์เยอะ
          #     - Network ระหว่าง GitHub Actions runner ↔ Google API ไม่เสถียร
          #     - Script ID ไม่ถูกต้อง
          #
          #   วิธีใหม่: สร้าง .clasp.json เอง (เก็บแค่ scriptId) แล้ว push โดยตรง
          #   ไม่ต้อง download ไฟล์เดิม — เราจะ push ทับทั้งหมดอยู่แล้ว

          mkdir -p apps-script-target
          cd apps-script-target

          # สร้าง .clasp.json ด้วยตัวเอง
          cat > .clasp.json << EOF
          {
            "scriptId": "$APPS_SCRIPT_ID",
            "rootDir": "."
          }
          EOF

          echo "  ✅ สร้าง .clasp.json สำเร็จ:"
          cat .clasp.json
          echo ""

          # ตรวจสอบว่า .clasp.json valid JSON
          if ! python3 -c "import json; json.load(open('.clasp.json'))" 2>/dev/null; then
            echo "  ❌ .clasp.json ไม่ใช่ valid JSON"
            exit 1
          fi
          echo "  ✅ .clasp.json เป็น valid JSON"

      - name: 📋 Copy source files (flatten for Apps Script)
        run: |
          echo "=== 📋 Copy source files (flatten structure) ==="
          # [FIX Deploy] Apps Script ไม่รองรับ subdirectories — ทุกไฟล์ต้องอยู่ที่ root level
          #   โครงสร้าง src/ มี subdirectories: O_core_system/, 1_group1_master_db/, etc.
          #   ต้อง flatten ทุกไฟล์ไปที่ root ของ apps-script-target/
          rm -rf apps-script-target/src apps-script-target/appsscript.json

          # สร้าง target dir
          mkdir -p apps-script-target

          # Flatten: copy ทุก .gs, .html, .json จาก src/ ไป root level
          # ใช้ find + cp แทน cp -r เพื่อให้ไฟล์ทั้งหมดอยู่ที่ root
          find src -type f \( -name "*.gs" -o -name "*.html" -o -name "*.json" \) -exec cp {} apps-script-target/ \;

          # Copy appsscript.json ไป root
          cp appsscript.json apps-script-target/

          echo "  📂 ไฟล์ที่จะ deploy (flat structure):"
          find apps-script-target -type f -maxdepth 1 | sort | sed 's/^/    /'
          echo ""
          echo "  📊 จำนวนไฟล์: $(find apps-script-target -type f -maxdepth 1 | wc -l)"

      - name: 🚀 Push to Apps Script (retry + verbose)
        run: |
          echo "=== 🚀 Push code to Apps Script ==="
          cd apps-script-target

          # [FIX Deploy #5] เพิ่ม retry 5 ครั้ง + verbose mode
          #   สาเหตุ: 'Premature close' เป็น transient Google API error ที่พบบ่อย
          #   โดยเฉพาะเมื่อ push ไฟล์เยอะ (35 files) ในครั้งเดียว
          #   บางครั้ง retry 2-3 ครั้งก็ผ่าน

          MAX_PUSH_RETRIES=5
          PUSH_SUCCESS=false

          for attempt in $(seq 1 $MAX_PUSH_RETRIES); do
            echo ""
            echo "  🔄 Push attempt $attempt/$MAX_PUSH_RETRIES..."

            # ลอง clasp push --force (verbose mode)
            if clasp push --force 2>&1; then
              echo "  ✅ Push สำเร็จ (attempt $attempt)"
              PUSH_SUCCESS=true
              break
            else
              echo "  ⚠️ Push ล้มเหลว (attempt $attempt)"

              if [[ $attempt -lt $MAX_PUSH_RETRIES ]]; then
                # Backoff: 5s, 10s, 15s, 20s
                BACKOFF=$((attempt * 5))
                echo "  ⏳ รอ $BACKOFF วินาทีก่อน retry..."
                sleep $BACKOFF
              fi
            fi
          done

          if [[ "$PUSH_SUCCESS" != "true" ]]; then
            echo ""
            echo "  ❌ Push ล้มเหลวครบ $MAX_PUSH_RETRIES ครั้ง"
            echo ""
            echo "  === 🔍 การวินิจฉัย ==="
            echo "  ปัญหา 'Premature close' มักเกิดจาก:"
            echo ""
            echo "  1. Apps Script API ไม่ enabled ใน Google Cloud Project"
            echo "     → ไป https://console.cloud.google.com > APIs & Services > Library"
            echo "     → ค้นหา 'Apps Script API' > Enable"
            echo "     → ค้นหา 'Google Drive API' > Enable (ถ้ายังไม่เปิด)"
            echo ""
            echo "  2. CLASPRC token หมดอายุ"
            echo "     → ในเครื่องรัน: clasp login --relogin"
            echo "     → cat ~/.clasprc.json > copy ไปอัปเดต GitHub Secret CLASPRC"
            echo ""
            echo "  3. Apps Script project เป็น Container-bound (ผูกกับ Sheet/Doc)"
            echo "     → แนะนำสร้าง Standalone project ใหม่ที่ script.google.com"
            echo ""
            echo "  4. Network issue ถาวรระหว่าง GitHub Actions ↔ Google API"
            echo "     → ลอง deploy ด้วยมือจากเครื่องผู้ใช้ก่อน:"
            echo "       cd phaopanya-scg"
            echo "       find src -type f \\( -name '*.gs' -o -name '*.html' \\) -exec cp {} . \\;"
            echo "       clasp clone <SCRIPT_ID>"
            echo "       clasp push"
            exit 1
          fi

      - name: 📝 สร้าง Version + อัปเดต Web App Deployment
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
          CLASPRC: ${{ secrets.CLASPRC }}
        run: |
          echo "=== 📝 สร้าง Versioned Deployment ==="
          cd apps-script-target

          # 1. สร้าง version ใหม่ใน Apps Script
          version_description="auto-${{ github.sha }}"
          echo "  📝 สร้าง version: $version_description"
          clasp deploy --description "$version_description" || echo "  ⚠️ deploy ล้มเหลว — ใช้ @HEAD แทน"

          # 2. [FIX] อัปเดต Web App deployment ให้ชี้ไป version ล่าสุด
          #   สาเหตุ: clasp push อัปเดตโค้ดที่ @HEAD แต่ Web App URL ใช้ version เฉพาะ
          #   ต้องอัปเดต deployment ด้วย ไม่งั้น URL เดิมยังชี้ไปโค้ดเก่า
          echo ""
          echo "  🔄 อัปเดต Web App deployment ให้ชี้ไป version ล่าสุด..."

          # ดึง access token — ลองหลายวิธีเพราะ clasprc.json format เปลี่ยนตาม clasp version
          ACCESS_TOKEN=""
          
          # วิธีที่ 1: ใช้ clasp ตรงๆ (ถ้ามี command ที่ใช้ได้)
          if command -v clasp &> /dev/null; then
            # clasp ไม่มี command ดึง token ตรง — ข้ามไปวิธีอื่น
            :
          fi
          
          # วิธีที่ 2: อ่านจาก clasprc.json ด้วย python (รองรับหลาย format)
          ACCESS_TOKEN=$(python3 -c "
          import json, os, sys
          clasprc_path = os.path.join(os.environ.get('HOME', '/root'), '.clasprc.json')
          try:
              with open(clasprc_path) as f:
                  d = json.load(f)
              # Format 1: clasp 2.x — { token: { access_token: '...' } }
              if 'token' in d and isinstance(d['token'], dict):
                  token = d['token']
                  if 'access_token' in token:
                      print(token['access_token'])
                      sys.exit(0)
              # Format 2: clasp 3.x — { access_token: '...' }
              if 'access_token' in d:
                  print(d['access_token'])
                  sys.exit(0)
              # Format 3: clasp 3.x — { oauth2Client: { access_token: '...' } }
              if 'oauth2Client' in d and isinstance(d['oauth2Client'], dict):
                  if 'access_token' in d['oauth2Client']:
                      print(d['oauth2Client']['access_token'])
                      sys.exit(0)
              print('')
          except Exception as e:
              print('')
          " 2>/dev/null || echo "")

          # วิธีที่ 3: ถ้ายังไม่ได้ token — refresh ด้วย refresh_token
          if [[ -z "$ACCESS_TOKEN" ]]; then
            echo "  ℹ️  ไม่พบ access_token ใน clasprc.json — ลอง refresh token..."
            REFRESH_TOKEN=$(python3 -c "
            import json, os
            clasprc_path = os.path.join(os.environ.get('HOME', '/root'), '.clasprc.json')
            try:
                with open(clasprc_path) as f:
                    d = json.load(f)
                if 'token' in d and isinstance(d['token'], dict):
                    print(d['token'].get('refresh_token', ''))
                elif 'refresh_token' in d:
                    print(d['refresh_token'])
                else:
                    print('')
            except Exception:
                print('')
            " 2>/dev/null || echo "")

            CLIENT_ID=$(python3 -c "
            import json, os
            clasprc_path = os.path.join(os.environ.get('HOME', '/root'), '.clasprc.json')
            try:
                with open(clasprc_path) as f:
                    d = json.load(f)
                if 'token' in d and isinstance(d['token'], dict):
                    print(d['token'].get('client_id', ''))
                elif 'oauth2Client' in d:
                    print(d['oauth2Client'].get('client_id', ''))
                else:
                    print('')
            except Exception:
                print('')
            " 2>/dev/null || echo "")

            CLIENT_SECRET=$(python3 -c "
            import json, os
            clasprc_path = os.path.join(os.environ.get('HOME', '/root'), '.clasprc.json')
            try:
                with open(clasprc_path) as f:
                    d = json.load(f)
                if 'token' in d and isinstance(d['token'], dict):
                    print(d['token'].get('client_secret', ''))
                elif 'oauth2Client' in d:
                    print(d['oauth2Client'].get('client_secret', ''))
                else:
                    print('')
            except Exception:
                print('')
            " 2>/dev/null || echo "")

            if [[ -n "$REFRESH_TOKEN" && -n "$CLIENT_ID" && -n "$CLIENT_SECRET" ]]; then
              ACCESS_TOKEN=$(curl -s -X POST \
                -d "client_id=$CLIENT_ID" \
                -d "client_secret=$CLIENT_SECRET" \
                -d "refresh_token=$REFRESH_TOKEN" \
                -d "grant_type=refresh_token" \
                "https://oauth2.googleapis.com/token" | python3 -c "
              import json, sys
              try:
                  d = json.load(sys.stdin)
                  print(d.get('access_token', ''))
              except Exception:
                  print('')
              " 2>/dev/null || echo "")
              if [[ -n "$ACCESS_TOKEN" ]]; then
                echo "  ✅ Refresh token สำเร็จ"
              fi
            fi
          fi

          if [[ -z "$ACCESS_TOKEN" ]]; then
            echo "  ⚠️  ไม่สามารถดึง access_token — ข้ามการอัปเดต deployment"
            echo "  ℹ️  ผู้ใช้ต้องอัปเดต deployment เองใน Apps Script Editor"
          else
            # List deployments เพื่อหา Web App deployment ID
            DEPLOYMENTS_JSON=$(curl -s \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              "https://script.googleapis.com/v1/projects/$APPS_SCRIPT_ID/deployments")

            # หา deployment ที่มี webApp config (entryPoint.webApp)
            WEBAPP_DEPLOYMENT_ID=$(echo "$DEPLOYMENTS_JSON" | python3 -c "
            import json, sys
            try:
                d = json.load(sys.stdin)
                for dep in d.get('deployments', []):
                    entry_points = dep.get('entryPoints', [])
                    for ep in entry_points:
                        if ep.get('entryPointType') == 'WEB_APP':
                            print(dep.get('deploymentId', ''))
                            sys.exit(0)
                print('')
            except Exception:
                print('')
            " 2>/dev/null)

            if [[ -z "$WEBAPP_DEPLOYMENT_ID" ]]; then
              echo "  ⚠️  ไม่พบ Web App deployment — ผู้ใช้ต้องสร้าง deployment เอง"
            else
              echo "  📋 Web App deployment ID: $WEBAPP_DEPLOYMENT_ID"

              # ดึง version ล่าสุด
              LATEST_VERSION=$(curl -s \
                -H "Authorization: Bearer $ACCESS_TOKEN" \
                "https://script.googleapis.com/v1/projects/$APPS_SCRIPT_ID/versions" | \
                python3 -c "
              import json, sys
              try:
                  d = json.load(sys.stdin)
                  versions = d.get('versions', [])
                  if versions:
                      print(versions[0].get('versionNumber', ''))
                  else:
                      print('')
              except Exception:
                  print('')
              " 2>/dev/null)

              if [[ -n "$LATEST_VERSION" ]]; then
                echo "  📋 Latest version: $LATEST_VERSION"

                # อัปเดต deployment ให้ชี้ไป version ล่าสุด
                UPDATE_RESULT=$(curl -s -X PUT \
                  -H "Authorization: Bearer $ACCESS_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{\"versionNumber\": $LATEST_VERSION, \"manifestFileName\": \"appsscript.json\", \"description\": \"$version_description\"}" \
                  "https://script.googleapis.com/v1/projects/$APPS_SCRIPT_ID/deployments/$WEBAPP_DEPLOYMENT_ID")

                if echo "$UPDATE_RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); sys.exit(0 if 'deploymentId' in d else 1)" 2>/dev/null; then
                  echo "  ✅ อัปเดต Web App deployment สำเร็จ → version $LATEST_VERSION"
                else
                  echo "  ⚠️  อัปเดต deployment ล้มเหลว:"
                  echo "$UPDATE_RESULT" | head -5
                fi
              else
                echo "  ⚠️  ไม่สามารถดึง version ล่าสุด"
              fi
            fi
          fi

      - name: 📢 แจ้งเตือน Discord/Slack (ถ้ามี Webhook)
        if: success()
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK }}
        run: |
          if [[ -n "$WEBHOOK_URL" ]]; then
            curl -X POST "$WEBHOOK_URL" \
              -H 'Content-Type: application/json' \
              -d '{
                "content": "✅ **Deploy สำเร็จ!**",
                "embeds": [{
                  "title": "🚚 Phaopanya SCG → Apps Script",
                  "fields": [
                    {"name": "Version", "value": "'"${{ github.event.inputs.version || 'auto' }}"'", "inline": true},
                    {"name": "Commit", "value": "'"${{ github.sha }}"'", "inline": true},
                    {"name": "Author", "value": "'"${{ github.actor }}"'", "inline": true}
                  ],
                  "color": 3066993
                }]
              }'
            echo "  ✅ ส่งแจ้งเตือนแล้ว"
          fi

      - name: 🎉 Deploy สำเร็จ
        run: |
          echo ""
          echo "=========================================="
          echo "  ✅ DEPLOY สำเร็จ!"
          echo "=========================================="
          echo "  - Commit: ${{ github.sha }}"
          echo "  - Author: ${{ github.actor }}"
          echo "  - ไฟล์: $(find src -name '*.gs' | wc -l) ไฟล์"
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
      - name: 🌐 แสดง URL
        run: echo "🌐 https://script.google.com/d/$APPS_SCRIPT_ID/edit"
        env:
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}

  verify:
    name: ✅ Post-deploy Verification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy
    # [FIX Deploy #6] verify job ต้อง setup Node + clasp ใหม่ เพราะเป็น job แยก
    #   deploy job ลง clasp ไว้ใน PATH ของตัวเอง แต่ verify job เริ่มใหม่ PATH ว่าง
    #   ทำให้เจอ 'clasp: command not found' หลัง push สำเร็จ

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Setup Node.js 20 + clasp (สำหรับ verify)
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          check-latest: true

      - name: 📦 ติดตั้ง clasp
        run: npm install -g @google/clasp

      - name: 📥 ดึง Apps Script กลับมา verify
        env:
          CLASPRC: ${{ secrets.CLASPRC }}
          APPS_SCRIPT_ID: ${{ secrets.APPS_SCRIPT_ID }}
        run: |
          echo "=== 📥 Pull Apps Script กลับมา verify ==="
          echo "$CLASPRC" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json
          mkdir -p verify-target
          cd verify-target
          # [FIX Deploy #6] ใช้ npx clasp เพื่อให้หา command ได้แม้ PATH ไม่ตรง
          npx clasp pull "$APPS_SCRIPT_ID" || clasp pull "$APPS_SCRIPT_ID"

      - name: 🔍 ตรวจว่าไฟล์ใน Apps Script ตรงกับ repo
        run: |
          echo "=== 🔍 Diff ระหว่าง repo กับ Apps Script ==="
          diff_count=0
          for src_file in $(find src -name "*.gs" -type f); do
            rel_path=${src_file#src/}
            target="verify-target/$rel_path"
            if [[ ! -f "$target" ]]; then
              echo "  ⚠️  ขาดใน Apps Script: $rel_path"
              diff_count=$((diff_count+1))
              continue
            fi
            src_hash=$(md5sum "$src_file" | awk '{print $1}')
            target_hash=$(md5sum "$target" | awk '{print $1}')
            if [[ "$src_hash" != "$target_hash" ]]; then
              echo "  ❌ ไม่ตรงกัน: $rel_path"
              diff_count=$((diff_count+1))
            else
              echo "  ✅ $rel_path"
            fi
          done
          if [[ $diff_count -eq 0 ]]; then
            echo "  🎉 ทุกไฟล์ตรงกัน!"
          else
            echo "  ⚠️  มี $diff_count ไฟล์ไม่ตรงกัน"
          fi
