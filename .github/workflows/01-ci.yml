name: 🔍 CI - Code Quality Check

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

# ยกเลิกงานเก่าที่ค้าง เมื่อมี push ใหม่เข้ามา
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========================================
  # Job 1: ตรวจสอบ Syntax พื้นฐานของไฟล์ .gs
  # ========================================
  syntax-check:
    name: 🔧 Syntax Check (.gs files)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v7

      - name: 🔍 Validate Google Apps Script syntax
        run: |
          echo "=== 📂 รายชื่อไฟล์ .gs ทั้งหมด ==="
          find src -name "*.gs" -type f | sort

          echo ""
          echo "=== 🔍 ตรวจสอบขนาดไฟล์ (เกิน 60KB อาจมีปัญหา) ==="
          find src -name "*.gs" -type f -exec sh -c '
            size=$(stat -c%s "$1")
            if [[ "$size" -gt 61440 ]]; then
              echo "  ⚠️  $1: $((size/1024))KB (ไฟล์ใหญ่)"
            else
              echo "  ✅  $1: $((size/1024))KB"
            fi
          ' _ {} \;

      - name: 📊 Count lines & functions per file
        run: |
          echo "=== 📊 สถิติไฟล์ ==="
          printf "%-50s %10s %10s\n" "File" "Lines" "Size(KB)"
          echo "----------------------------------------------------------------------"
          total_lines=0
          for f in $(find src -name "*.gs" -type f | sort); do
            lines=$(wc -l < "$f")
            size=$(stat -c%s "$f")
            printf "%-50s %10d %10d\n" "$f" "$lines" "$((size/1024))"
            total_lines=$((total_lines + lines))
          done
          echo "----------------------------------------------------------------------"
          printf "%-50s %10d\n" "TOTAL" "$total_lines"

      - name: 🔎 ตรวจจับ syntax error เบื้องต้น
        run: |
          echo "=== 🔎 ตรวจจับ syntax error ที่พบบ่อย ==="
          errors=0

          for f in $(find src -name "*.gs" -type f); do
            # ตรวจวงเล็บไม่สมดุล
            open_paren=$(grep -o '(' "$f" | wc -l)
            close_paren=$(grep -o ')' "$f" | wc -l)
            if [[ "$open_paren" -ne "$close_paren" ]]; then
              echo "  ❌ $f: วงเล็บ () ไม่สมดุล ($open_paren vs $close_paren)"
              errors=$((errors+1))
            fi

            open_brace=$(grep -o '{' "$f" | wc -l)
            close_brace=$(grep -o '}' "$f" | wc -l)
            if [[ "$open_brace" -ne "$close_brace" ]]; then
              echo "  ❌ $f: วงเล็บปีกกา {} ไม่สมดุล ($open_brace vs $close_brace)"
              errors=$((errors+1))
            fi
          done

          if [[ $errors -eq 0 ]]; then
            echo "  ✅ ไม่พบ syntax error พื้นฐาน"
          else
            echo "  ⚠️  พบ $errors ปัญหา"
          fi

      - name: 🛡️ ตรวจจับ Anti-pattern (16 Laws)
        run: |
          echo "=== 🛡️ ตรวจจับ Anti-pattern ตามกฎ 16 Immutable Laws ==="
          total_issues=0

          # Law 1: ห้าม Hardcoded Index (เช่น row[28])
          echo ""
          echo "📌 Law 1: ห้าม Hardcoded Index ใน row[xxx]"
          hardcoded_count=0
          for f in $(find src -name "*.gs" -type f); do
            matches=$(grep -nE 'row\[[0-9]+\]|getRange\([^)]*,\s*[0-9]+\s*,' "$f" | head -5)
            if [[ -n "$matches" ]]; then
              echo "  ⚠️  $f:"
              echo "$matches" | sed 's/^/      /'
              hardcoded_count=$((hardcoded_count+1))
            fi
          done
          if [[ $hardcoded_count -eq 0 ]]; then
            echo "  ✅ ไม่พบ Hardcoded Index"
          fi
          total_issues=$((total_issues + hardcoded_count))

          # Law 3: ห้ามใช้ setValue() ในลูป
          echo ""
          echo "📌 Law 3: ห้าม setValue() / appendRow() ในลูป"
          loop_setvalue_count=0
          for f in $(find src -name "*.gs" -type f); do
            # หา for loop ที่มี setValue หรือ appendRow ข้างใน
            awk '
              /for\s*\(.*\)\s*\{|while\s*\(.*\)\s*\{/ { in_loop=1; loop_line=NR; loop_code="" }
              in_loop { loop_code = loop_code "\n" $0 }
              /\}/ && in_loop && loop_code ~ /setValue\(|appendRow\(/ {
                if (loop_code !~ /setValues\(|setValue\(/) next
                print FILENAME ":" loop_line " - น่าจะมี setValue/appendRow ในลูป"
                in_loop=0
              }
              /\}/ && in_loop { in_loop=0 }
            ' "$f"
          done | head -10
          echo "  ℹ️  (ตรวจด้วยตาเปล่าอีกครั้ง)"

          # Law: ห้ามมี Secret (API Key, Cookie)
          echo ""
          echo "📌 Security: ห้าม commit Secret ลง repo"
          secret_patterns='AIza[A-Za-z0-9_-]{35}|AQ\.[A-Za-z0-9_-]+|password|cookie.*=.*[a-zA-Z0-9]{30}'
          secret_count=0
          for f in $(find src -name "*.gs" -type f); do
            if grep -iE "$secret_patterns" "$f" | grep -vE "^\\s*\\*|^//" > /dev/null; then
              echo "  ⚠️  $f: อาจมี Secret — ตรวจด้วยตาเปล่า"
              grep -iE "$secret_patterns" "$f" | head -3 | sed 's/^/      /'
              secret_count=$((secret_count+1))
            fi
          done
          if [[ $secret_count -eq 0 ]]; then
            echo "  ✅ ไม่พบ Secret"
          fi
          total_issues=$((total_issues + secret_count))

          echo ""
          echo "=== 📊 สรุป: พบปัญหาทั้งหมด $total_issues รายการ ==="
          exit 0  # ไม่ fail build เพราะเป็นแค่ warning

      - name: 📋 ตรวจสอบ appsscript.json
        run: |
          echo "=== 📋 ตรวจสอบ appsscript.json ==="
          if [[ ! -f "appsscript.json" ]]; then
            echo "  ❌ ไม่พบไฟล์ appsscript.json"
            exit 1
          fi

          # ตรวจสอบ JSON valid
          if ! python3 -c "import json; json.load(open('appsscript.json'))" 2>/dev/null; then
            echo "  ❌ appsscript.json ไม่ใช่ JSON ที่ถูกต้อง"
            exit 1
          fi
          echo "  ✅ appsscript.json valid"

          # ตรวจสอบ field สำคัญ
          python3 << 'PYEOF'
          import json
          with open('appsscript.json') as f:
              cfg = json.load(f)

          required_fields = ['timeZone', 'dependencies', 'exceptionLogging', 'runtimeVersion']
          missing = [f for f in required_fields if f not in cfg]
          if missing:
              print(f"  ⚠️  ขาด field: {', '.join(missing)}")
          else:
              print(f"  ✅ มี field ครบ: {', '.join(required_fields)}")

          # ตรวจสอบ OAuth scopes
          scopes = cfg.get('oauthScopes', [])
          print(f"  📋 OAuth Scopes: {len(scopes)} รายการ")
          for s in scopes:
              print(f"      - {s}")
          PYEOF

  # ========================================
  # Job 2: ตรวจสอบโครงสร้าง Domain
  # ========================================
  domain-check:
    name: 🏛️ Domain Architecture Check
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: syntax-check

    steps:
      - uses: actions/checkout@v7

      - name: 🏛️ ตรวจสอบการแบ่ง Domain (3 กลุ่ม)
        run: |
          echo "=== 🏛️ Domain Architecture Check ==="

          # Group 0 (Core)
          echo ""
          echo "⚙️  Group 0 — Core System (ควรอยู่ใน O_core_system/):"
          ls src/O_core_system/ 2>/dev/null | sed 's/^/  📄 /' || echo "  ❌ ไม่พบโฟลเดอร์ O_core_system"

          # Group 1 (Master DB)
          echo ""
          echo "🟩 Group 1 — Master DB (ควรอยู่ใน 1_group1_master_db/):"
          ls src/1_group1_master_db/ 2>/dev/null | sed 's/^/  📄 /' || echo "  ❌ ไม่พบโฟลเดอร์ 1_group1_master_db"

          # Group 2 (Daily Ops)
          echo ""
          echo "🟦 Group 2 — Daily Ops (ควรอยู่ใน 2_group2_daily_ops/):"
          ls src/2_group2_daily_ops/ 2>/dev/null | sed 's/^/  📄 /' || echo "  ❌ ไม่พบโฟลเดอร์ 2_group2_daily_ops"

          # นับไฟล์ทั้งหมด
          total=$(find src -name "*.gs" -type f | wc -l)
          echo ""
          echo "📊 ไฟล์ .gs ทั้งหมด: $total ไฟล์"

          if [[ "$total" -ne 22 ]]; then
            echo "  ⚠️  ควรมี 22 ไฟล์ (00 ถึง 21) — ตอนนี้มี $total ไฟล์"
          else
            echo "  ✅ ครบ 22 ไฟล์ ตามที่ CONTEXT ระบุ"
          fi

      - name: 🔗 ตรวจสอบ Cross-Domain Dependencies
        run: |
          echo "=== 🔗 Cross-Domain Import Check ==="
          echo ""
          echo "กฎ: Group 2 ห้ามเขียน M_ALIAS, M_PERSON, M_PLACE, M_GEO_POINT โดยตรง"
          echo "    ต้องผ่าน resolveAndPersist_() gateway ของ 10_MatchEngine เท่านั้น"
          echo ""
          echo "ℹ️  ตรวจสอบด้วยตาเปล่าว่ามี Group 2 → M_ALIAS write หรือไม่"

          # นับการอ้างถึง M_ALIAS ใน Group 2
          group2_alias_refs=$(grep -rn "M_ALIAS\|M_PERSON\|M_PLACE\|M_GEO_POINT" src/2_group2_daily_ops/*.gs 2>/dev/null | wc -l)
          echo "  📊 Group 2 อ้างถึง Master sheets: $group2_alias_refs ครั้ง"

          # นับการอ้างถึง M_ALIAS ใน Group 1
          group1_alias_refs=$(grep -rn "M_ALIAS" src/1_group1_master_db/*.gs 2>/dev/null | wc -l)
          echo "  📊 Group 1 อ้างถึง M_ALIAS: $group1_alias_refs ครั้ง"

  # ========================================
  # Job 3: ตรวจสอบ Review15 Compliance
  # ========================================
  review15-check:
    name: ✅ REVIEW15 Compliance Check
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v7

      - name: 📋 ตรวจสอบ 16 Immutable Laws
        run: |
          echo "=== ✅ REVIEW15 — 16 Immutable Laws Check ==="
          echo ""
          echo "ℹ️  ดูรายละเอียดที่ docs/📋 กฎการเขียนโค้ด LMDS V5.5.md"
          echo ""
          echo "📌 Law 1: ไม่มี Hardcoded Index"
          echo "📌 Law 2: Single Writer Pattern (M_ALIAS เขียนโดย 10_MatchEngine/21_AliasService เท่านั้น)"
          echo "📌 Law 3: Batch Operations (setValues แทน setValue)"
          echo "📌 Law 4: ใช้ Index จาก 01_Config"
          echo "📌 Law 5: Entry Point มี try-catch"
          echo "📌 Law 6: Log error ด้วย logError()"
          echo "📌 Law 13: ห้าม Silent Fail"
          echo "📌 Law 16: ไม่เก็บ Secret ใน Cell"
          echo ""

          # นับ try-catch
          try_count=$(grep -r "try {" src/ --include="*.gs" | wc -l)
          catch_count=$(grep -r "} catch" src/ --include="*.gs" | wc -l)
          echo "  📊 try { } blocks: $try_count"
          echo "  📊 catch blocks: $catch_count"

          if [[ "$try_count" -gt 0 ]]; then
            ratio=$((catch_count * 100 / try_count))
            echo "  📊 Coverage: ${ratio}%"
          fi

          # นับการใช้งาน logError / logInfo
          logerror=$(grep -r "logError(" src/ --include="*.gs" | wc -l)
          loginfo=$(grep -r "logInfo(" src/ --include="*.gs" | wc -l)
          echo ""
          echo "  📊 logError() calls: $logerror"
          echo "  📊 logInfo() calls: $loginfo"

      - name: 🏷️ ตรวจสอบ Version Tag ในทุกไฟล์
        run: |
          echo "=== 🏷️ ตรวจสอบ VERSION tag ในทุกไฟล์ ==="
          missing=0
          for f in $(find src -name "*.gs" -type f | sort); do
            version=$(grep -E "^ \* VERSION:|VERSION:" "$f" | head -1)
            if [[ -z "$version" ]]; then
              echo "  ⚠️  $f: ไม่มี VERSION tag"
              missing=$((missing+1))
            else
              echo "  ✅  $(basename $f): $version" | sed 's/\*//g'
            fi
          done
          echo ""
          if [[ $missing -gt 0 ]]; then
            echo "  ⚠️  $missing ไฟล์ไม่มี VERSION tag"
          else
            echo "  ✅ ทุกไฟล์มี VERSION tag"
          fi
