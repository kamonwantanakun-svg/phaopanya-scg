name: 🏷️ Release - Auto Tag & Notes

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      version:
        description: '📌 Version (เช่น v5.5.023) — เว้นว่างเพื่อ auto-bump'
        required: false

jobs:
  release:
    name: 🏷️ Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚙️ Configure Git identity
        # [FIX Release] GitHub Actions runner ไม่ได้ตั้ง git user.name/email ไว้
        #   ทำให้ git tag -a fail ด้วย 'Committer identity unknown'
        #   แก้โดยตั้ง identity ก่อนที่จะมีการ commit/tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          echo "  ✅ Git identity configured:"
          git config --global user.name
          git config --global user.email

      - name: 🔍 ดึง Version ปัจจุบันจากโค้ด
        id: version
        run: |
          current=$(grep "VERSION:" src/O_core_system/00_App.gs | head -1 | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" || echo "5.5.022")
          echo "  📋 Current version: v$current"
          input_version="${{ github.event.inputs.version }}"
          if [[ -n "$input_version" ]]; then
            version=$(echo "$input_version" | sed 's/^v//')
          else
            IFS='.' read -r major minor patch <<< "$current"
            patch=$((patch + 1))
            version="$major.$minor.$patch"
          fi
          echo "  🆕 New version: v$version"
          echo "version=v$version" >> "$GITHUB_OUTPUT"
          echo "previous=v$current" >> "$GITHUB_OUTPUT"

      - name: 📊 ดู commits ตั้งแต่ release ที่แล้ว
        id: commits
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [[ -n "$latest_tag" ]]; then
            echo "  🏷️  Latest tag: $latest_tag"
            commits=$(git log "${latest_tag}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            echo "  ℹ️  No previous tag — ดึง 20 commits ล่าสุด"
            commits=$(git log -20 --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$commits" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: 📝 สร้าง Release Notes
        run: |
          version="${{ steps.version.outputs.version }}"
          previous="${{ steps.version.outputs.previous }}"
          cat > release-notes.md << EOF
          # 🚀 Release $version

          **LMDS V5.5** — Phaopanya Logistics Master Data System

          ## 📊 สรุปการเปลี่ยนแปลง
          - Previous: $previous
          - New: $version
          - Released: $(date -u '+%Y-%m-%d %H:%M UTC')
          - Commit: ${{ github.sha }}

          ## 📝 Commits ใน Release นี้

          ${{ steps.commits.outputs.commits }}

          ## 📋 ไฟล์ที่เปลี่ยน

          EOF
          git diff --name-only HEAD~10..HEAD 2>/dev/null | grep -v "^$" >> release-notes.md || echo "  (no diff)"
          cat release-notes.md

      - name: 🏷️ สร้าง Git Tag
        run: |
          version="${{ steps.version.outputs.version }}"
          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "  ⚠️  Tag $version มีอยู่แล้ว — ลบก่อน"
            git tag -d "$version"
          fi
          git tag -a "$version" -m "Release $version

          Auto-generated by GitHub Actions
          Commit: ${{ github.sha }}
          Author: ${{ github.actor }}"
          git push origin "$version" --force
          echo "  ✅ Tag $version pushed"

      - name: 📦 สร้าง GitHub Release
        # [FIX SonarCloud S7637] Use full commit SHA instead of tag @v2
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          name: ${{ steps.version.outputs.version }}
          tag_name: ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.event.inputs.version, 'rc') || contains(github.event.inputs.version, 'beta') }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🎉 Release สำเร็จ
        run: |
          version="${{ steps.version.outputs.version }}"
          echo ""
          echo "=========================================="
          echo "  🎉 RELEASE สำเร็จ!"
          echo "=========================================="
          echo "  🏷️  Tag: $version"
          echo "  📦 https://github.com/${{ github.repository }}/releases/tag/$version"
